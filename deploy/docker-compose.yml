# GoAcademy — Docker Compose (полный стек, STAGE 18.3)
#
# Поднять всё:   docker compose -f deploy/docker-compose.yml up -d --build
# С .env:        docker compose --env-file .env -f deploy/docker-compose.yml up -d --build
# Только БД:     docker compose -f deploy/docker-compose.yml up -d postgres
#
# Порядок старта: postgres (healthy) → migrate (применяет миграции, выходит) →
# backend → frontend. Значения по умолчанию ниже совпадают с .env.example, поэтому
# стек поднимается и без .env. Фронтенд (nginx) проксирует /api и /static на backend,
# поэтому браузер ходит на один origin (CORS не нужен).
#
# Открыть после старта: http://localhost:${FRONTEND_PORT:-3000}
#
# ВНИМАНИЕ (прод): смените JWT_SECRET и POSTGRES_PASSWORD. Песочница/судья
# (SANDBOX_ENABLED) в этом образе backend недоступны — им нужен Go-тулчейн + доступ
# к Docker на хосте (DooD); см. README.

name: goacademy

services:
  postgres:
    image: postgres:${POSTGRES_VERSION:-17}-alpine
    container_name: goacademy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-goacademy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-goacademy_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-goacademy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-goacademy} -d ${POSTGRES_DB:-goacademy}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-shot: apply all migrations, then exit. backend waits for it to succeed.
  migrate:
    image: goacademy-backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: goacademy-migrate
    # Override the image ENTRYPOINT (the api binary) to run the migrate binary.
    entrypoint: ["/usr/local/bin/migrate"]
    command: ["up"]
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-goacademy}:${POSTGRES_PASSWORD:-goacademy_dev_password}@postgres:5432/${POSTGRES_DB:-goacademy}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    image: goacademy-backend
    container_name: goacademy-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-goacademy}:${POSTGRES_PASSWORD:-goacademy_dev_password}@postgres:5432/${POSTGRES_DB:-goacademy}?sslmode=disable
      APP_ENV: ${APP_ENV:-production}
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: "8080"
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      JWT_SECRET: ${JWT_SECRET:-dev_only_change_me_secret_min_32_chars}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAMESITE: ${COOKIE_SAMESITE:-lax}
      STORAGE_LOCAL_DIR: /data/storage
      STORAGE_PUBLIC_BASE_URL: /static
    volumes:
      - backend-storage:/data
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    ports:
      - "${HTTP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: goacademy-frontend
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: goacademy-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"

  # code-runner (CHAPTER 16): песочница/судья запускаются in-process в backend и
  # требуют Go-тулчейн + доступ к Docker (DooD). Включаются на хосте с Docker через
  # SANDBOX_ENABLED=true (не в этом минимальном backend-образе); см. README.

volumes:
  postgres-data:
    name: goacademy-postgres-data
  backend-storage:
    name: goacademy-backend-storage
