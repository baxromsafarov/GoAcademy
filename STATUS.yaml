    alternatives: ["фиксированный XP за daily в XPFor (не учитывает per-day bonus)", "отдельная транзакция начисления вне recorder", "хранить вызов без uniqueness по дате"]
  - decision: "Лидерборд: пакет internal/social; all-time по user_stats.total_xp, period по SUM(activity_log.xp_earned); фильтр is_public/is_blocked; публичный эндпоинт (D-021)."
    rationale: "Социальные кросс-пользовательские фичи (лидерборд, далее заметки/закладки/сертификаты) — отдельный пакет social. All-time читает денормализованный total_xp (индекс total_xp DESC), period суммирует xp_earned по activity_log за UTC-окно (источник истины для рейтинга-за-период). Приватность — только is_public и НЕ is_blocked. Эндпоинт публичный (без auth): показывает лишь тех, кто согласился (is_public). periodWindow — чистая функция (all/week=7д/month=30д) с инъекцией now()."
    date: "2026-06-25"
    alternatives: ["лидерборд в gamification", "только all-time без периодов", "требовать auth для просмотра рейтинга", "хранить периодные агрегаты отдельно (преждевременно)"]
  - decision: "Сертификаты: выдача через явный POST /tracks/{id}/certificate с проверкой 100% (social зависит от progress); код GOAC-<base32>; публичная верификация по коду (D-022)."
    rationale: "Завершение трека вычисляемо (не событие), поэтому CertificatesService переиспользует progress.TrackProgress для проверки 100% перед выдачей (social→progress, без цикла). Выдача идемпотентна (UNIQUE user+track, ON CONFLICT DO NOTHING). Явный claim-эндпоинт декуплирует прогресс от сертификатов и совместим с будущим автотриггером. certificate_code (GOAC- + base32 10 случайных байт) — публичный проверяемый идентификатор; GET /certificates/{code} без auth отдаёт display_name+track_title+issued_at."
    date: "2026-06-25"
    alternatives: ["автовыдача внутри GET /tracks/{id}/progress (связывает прогресс с сертификатами)", "хранить завершение трека как событие/флаг", "числовой/последовательный код сертификата"]
  - decision: "Фронтенд-стек (CH14): Vite 8 + React 19 + TS; React Router 7 (не TanStack Router); Tailwind v4 (@tailwindcss/vite) + shadcn-совместимые токены вместо полного shadcn-CLI; алиас @→src; тема через класс .dark + CSS-переменные (D-023)."
    rationale: "Прямой контроль и минимум зависимостей. React Router — из двух разрешённых промтом вариантов (проще, стабильнее для SPA). Tailwind v4 ставит цвета/тему через CSS-переменные (oklch) и @theme inline — этого достаточно для shadcn-стиля без интерактивного shadcn-CLI; реальные shadcn-компоненты копируются по мере надобности (CH15). cn() (clsx+tailwind-merge) — общая утилита. TanStack Query добавляется в 14.2 (серверное состояние). i18next — 14.3. Node.js установлен пользователем (winget)."
    date: "2026-06-25"
    alternatives: ["TanStack Router", "полный shadcn-CLI init сразу", "Tailwind v3 (init -p)", "CSS-модули/styled-components"]
  - decision: "Auth на фронте: access-токен только в памяти, refresh в httpOnly-cookie; авто-refresh один раз при 401; bootstrap сессии через refresh→/me (D-024)."
    rationale: "Access-токен не кладём в localStorage (XSS-устойчивость) — только в памяти api-клиента; refresh-cookie (httpOnly, выставляет бэкенд) переживает перезагрузку и восстанавливает сессию на старте (refresh→/me). Авто-refresh при 401 с однократным повтором запроса; провал refresh чистит сессию (колбэк) → ProtectedRoute редиректит на /login. Единый разбор ошибок {error:{code,message,details}} в ApiError. Серверное состояние — TanStack Query."
    date: "2026-06-25"
    alternatives: ["access в localStorage (проще, но XSS-риск)", "stateless без refresh-bootstrap", "axios-интерсепторы вместо тонкого fetch-клиента"]
  - decision: "Статьи (фронт): react-markdown без rehype-raw как слой санитизации (сырой HTML не рендерится); rehype-highlight с узким набором грамматик; Markdown лениво грузится отдельным чанком (D-025)."
    rationale: "DoD требует санитизацию Markdown. react-markdown по умолчанию НЕ парсит встроенный HTML (rehype-raw не подключён) — любой <script>/<img onerror> отдаётся как инертный текст, а дефолтный URL-transform отбрасывает опасные схемы (javascript:); это и есть слой защиты от XSS, без отдельного rehype-sanitize (который иначе пришлось бы конфигурировать так, чтобы не срезать language-* классы, нужные rehype-highlight). Подсветка — rehype-highlight только с go/bash/json/yaml/sql/dockerfile (вместо ~37 языков common-набора hljs). Тяжёлые deps (react-markdown+highlight.js) изолированы в ленивый чанк через React.lazy → не утяжеляют основной бандл (main 391kB вместо 714kB). Кнопка «Открыть в песочнице» — заглушка-навигация на /sandbox до code-runner (CH16)."
    date: "2026-06-25"
    alternatives: ["rehype-sanitize с расширенной схемой (сложнее; риск срезать highlight-классы)", "shiki вместо highlight.js (тяжелее билд/рантайм)", "рендер всех языков hljs (раздувает бандл)", "Markdown в основном бандле без code-split"]
  - decision: "Code-runner (CH16.1, D-027): недоверенный Go компилируется на ХОСТЕ (CGO off, GOPROXY off → stdlib-only) и запускается статическим бинарником в одноразовом Docker-контейнере (network none, cap-drop ALL, no-new-privileges, non-root, mem/cpu/pids лимиты, tmpfs, wall-timeout, output cap). Раннер — in-process пакет backend/internal/runner, не отдельный микросервис."
    rationale: "Граница безопасности — контейнер, а не сервис, поэтому отдельный микросервис добавил бы операционную сложность без выигрыша в изоляции. Компиляция на хосте (а не в sandbox) безопасна (компилятор не исполняет исходник), даёт sub-second прогоны вместо ~10s холодной компиляции в контейнере и не даёт лимиту памяти контейнера убить сам компилятор. Доставка бинарника docker create -i → cp → start (rootfs НЕ read-only, т.к. docker cp в read-only запрещён; компенсируется network none + cap-drop + non-root + эфемерный контейнер). OOM детектируется через docker inspect .State.OOMKilled. Образ запуска — busybox (статический бинарник). Deploy: backend нужен Go-тулчейн + доступ к docker (DooD), хардening (seccomp, выделенный low-trust хост, pin образов) — на 18.x."
    date: "2026-06-25"
    alternatives: ["компиляция в контейнере (golang:alpine — медленно ~10s, риск OOM компилятора под лимитом)", "отдельный микросервис code-runner (лишняя операционка, та же изоляция)", "--read-only rootfs (несовместим с docker cp)", "volume-mount исходника (path-mangling на Windows Docker Desktop)", "gVisor/Firecracker (избыточно для MVP, отложено)"]
  - decision: "Контент адресуется по id ИЛИ slug (CH15.5): GET /articles/{ref} и /problems/{ref} вместе с под-роутами (read/complete, submissions/solution) принимают как UUID, так и slug (D-026)."
    rationale: "track_items ссылаются на контент полиморфно по content_id (UUID, D-006), а detail-страницы статей/задач на фронте маршрутизируются по slug (человекочитаемые URL). Чтобы переходы из программы трека работали единообразно для всех типов, content.GetArticleBySlug/GetProblemBySlug и progress-резолверы (resolveArticle/resolveProblem) определяют UUID через pgxutil.ParseUUID → lookup по id, иначе по slug. Видео/квизы уже маршрутизируются по UUID. Ресурс становится адресуемым и стабильным id, и slug (RESTful). По-id lookup реализован hand-written методами store (GetArticleByID/GetProblemByID в internal/store/content_byid.go, тот же пакет, читают q.db) — чтобы не дёргать перегенерацию sqlc (требует переключения go-тулчейна); отдельный файл sqlc-генерацию не трогает."
    date: "2026-06-25"
    alternatives: ["обогащать track detail title+slug на каждый элемент (joins по 5 типам контента)", "резолвить id→slug на фронте через list-эндпоинты (ненадёжно при пагинации)", "перегенерировать sqlc с by-id запросами", "сделать article/problem detail полностью id-маршрутизируемыми (теряются slug-URL)"]

