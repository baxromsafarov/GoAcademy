server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths fall back to index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Reverse-proxy the API and uploaded files to the backend so the browser only
    # ever talks to this origin (no CORS needed; the refresh cookie stays first-party).
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /static/ {
        proxy_pass http://backend:8080;
    }
}
