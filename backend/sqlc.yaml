version: "2"
sql:
  - engine: "postgresql"
    # Схема берётся из up-миграций; sqlc игнорирует *.down.sql.
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "store"
        out: "internal/store"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        emit_interface: false
